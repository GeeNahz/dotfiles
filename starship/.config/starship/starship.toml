# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Wait 10 milliseconds for starship to check files under the current directory.
scan_timeout = 10
command_timeout = 100000000

# Inserts a blank line between shell prompts
add_newline = true

# Replace the 'έζψ' symbol in the prompt with 'έηε'
[character] # The name of the module we are configuring is 'character'
success_symbol = '[έηε](bold green)' # The 'success_symbol' segment is being set to 'έηε' with the color 'bold green'
error_symbol = '[έεΩ](bold red)' # The 'error_symbol' segment is being set to 'έηε' with the color 'bold red'

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

[os]
disabled = false
# style = "bg:surface0 fg:text"

