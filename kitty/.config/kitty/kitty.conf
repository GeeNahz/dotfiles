# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME

# Tell kitty to identify as xterm-256color so tmux's terminal-overrides match.
# Without this, kitty defaults to TERM=xterm-kitty which tmux doesn't recognise,
# causing Unicode characters (prompt glyphs, Nerd Font icons) to render as "_".
term xterm-256color

# font_family      JetBrainsMono Nerd Font Mono
# font_family      MesloLGS NF
# bold_font        auto
# italic_font      auto
# bold_italic_font auto

font_size 12.0

# disable_ligatures
disable_ligatures never

# background_opacity
background_opacity 0.80
# background_opacity 0.90

# Windows bell
enable_audio_bell no

# Cursor
# cursor_shape block
shell_integration enabled no-cursor


# BEGIN_KITTY_FONTS
# -- previous setting --
# font_family      family="JetBrainsMono Nerd Font Mono"
# -- previous setting --
font_family      family="MesloLGS NF"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
