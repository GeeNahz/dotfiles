unbind r
bind r source-file ~/.tmux.conf

set -g focus-events on
set -g prefix C-s

set -g mouse on

setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

set-option -g status-position top

# Config for colors
# -- previous settings --
# set -g default-terminal "screen-256color"
# set-option -ga terminal-overrides ",xterm-256color:Tc"
# set -g default-terminal "xterm-256color"
# set-option -ga terminal-overrides ",screen-256color:Tc"
# -- previous settings --
# "tmux-256color" tells tmux to advertise full colour support internally;
# the override patches the *outer* terminal (kitty/xterm) with RGB truecolor
# so that glyphs and Nerd Font icons render correctly instead of showing "_".
set -g default-terminal "tmux-256color"
# -- previous setting (only matched xterm-256color; missed kitty's default TERM=xterm-kitty) --
# set-option -ga terminal-overrides ",xterm-256color:RGB"
# -- previous setting --
set-option -ga terminal-overrides ",xterm*:RGB"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
# -- previous setting (catppuccin loaded twice — via @plugin and manual run below) --
# set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'christoomey/vim-tmux-navigator'



set -g @catppuccin_flavor "mocha"

set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"

set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"

set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"

set -g @catppuccin_status_modules_right "directory host session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

set -g @catppuccin_directory_text "#{pane_current_path}"

# Load catppuccin
# run ~/.tmux/plugins/tmux/catppuccin.tmux
run ~/.tmux/plugins/catppuccin/tmux/catppuccin.tmux
# run ~/.tmux/plugins/tmux/catppuccin/tmux/catppuccin.tmux

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

set -g allow-passthrough all
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
